kind = "slides"
previewPath = "/cybershield-deck/"
title = "CyberShield Deck"
version = "1.0.0"
id = "artifacts/cybershield-deck"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/cybershield-deck/" ]
localPort = 20275

[services.development]
run = "pnpm --filter @workspace/cybershield-deck run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cybershield-deck", "run", "build" ]
publicDir = "artifacts/cybershield-deck/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20275"
BASE_PATH = "/cybershield-deck/"
