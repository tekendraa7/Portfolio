kind = "web"
previewPath = "/"
title = "CyberShield Portfolio"
version = "1.0.0"
id = "artifacts/cybershield"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19380

[services.development]
run = "pnpm --filter @workspace/cybershield run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cybershield", "run", "build" ]
publicDir = "artifacts/cybershield/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19380"
BASE_PATH = "/"
