<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Blog by Tekendra Bhandari — articles on Linux, cybersecurity, networking, and web development." />
  <title>Blog </title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/animation.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
  <!-- Favicons -->
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon-16x16.png" />
  <link rel="icon" type="image/png" href="/assets/images/favicon.png" />
  <link rel="shortcut icon" href="/assets/images/favicon.ico" />
  <link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.png" />
  <!-- PWA / Mobile -->
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="theme-color" content="#0A84FF" />
  <!-- Open Graph / Social -->
  <meta property="og:title" content="Tekendra Bhandari" />
  <meta property="og:description" content="Cybersecurity Portfolio" />
  <meta property="og:image" content="/assets/images/logo.png" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Tekendra Bhandari" />
  <meta name="twitter:description" content="Cybersecurity Portfolio" />
  <meta name="twitter:image" content="/assets/images/logo.png" />
</head>
<body>
<header id="navbar"></header>

<main class="page-offset">
  <section style="padding:60px 0 30px;background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(0,212,255,0.08) 0%,transparent 70%);">
    <div class="container">
      <div class="section-heading reveal">
        <h2>Blog</h2>
        <div class="section-divider"></div>
        <p>Thoughts, tutorials, and learning notes on Linux, cybersecurity, networking, and web dev.</p>
      </div>
    </div>
  </section>

  <section class="section" style="padding-top:40px;">
    <div class="container">

      <!-- Newsletter -->
      <div class="glass-card newsletter-wrap reveal">
        <h3>📬 Stay Updated</h3>
        <p>Subscribe to get new articles delivered straight to your inbox.</p>
        <form id="newsletterForm" class="newsletter-form" novalidate>
          <input type="text"  name="name"  placeholder="Your name"        required />
          <input type="email" name="email" placeholder="Your email address" required />
          <button type="submit" class="btn btn-primary">Subscribe</button>
        </form>
        <div id="newsletterMsg" class="form-success" style="margin-top:12px;"></div>
      </div>

      <!-- Category Filters -->
      <div class="portfolio-filters reveal" style="margin-bottom:36px;">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="Linux">Linux</button>
        <button class="filter-btn" data-filter="Networking">Networking</button>
        <button class="filter-btn" data-filter="Tools">Tools</button>
        <button class="filter-btn" data-filter="Career">Career</button>
        <button class="filter-btn" data-filter="Web Dev">Web Dev</button>
      </div>

      <!-- Blog Grid — rendered by blog.js -->
      <div class="blog-grid" id="blogGrid"></div>

    </div>
  </section>
</main>

<footer id="footer"></footer>
<button id="backToTop" class="btn btn-primary btn-sm" style="position:fixed;bottom:24px;right:24px;z-index:900;opacity:0;transition:opacity 0.3s ease;border-radius:50%;width:44px;height:44px;padding:0;font-size:1.1rem;display:flex;align-items:center;justify-content:center;line-height:1;">↑</button>
<script src="../javascript/navigation.js"></script>
<script src="../javascript/animation.js"></script>
<script src="../javascript/blog.js"></script>
<script src="../javascript/main.js"></script>
</body>
</html>
